<script>
    // Micro-interactions
    document.querySelectorAll('button, div[role="button"]').forEach(el => {
        el.addEventListener('mousedown', () => el.classList.add('active:scale-95'));
        el.addEventListener('mouseup', () => el.classList.remove('active:scale-95'));
    });

    // Handle active nav state
    const navItems = document.querySelectorAll('nav > div');
    navItems.forEach(item => {
        item.addEventListener('click', () => {
            navItems.forEach(i => {
                i.classList.remove('text-secondary', 'active-tab-glow');
                i.classList.add('text-on-surface-variant/60');
                const span = i.querySelector('span:first-child');
                if(span) span.style.fontVariationSettings = "'FILL' 0";
            });
            item.classList.add('text-secondary', 'active-tab-glow');
            item.classList.remove('text-on-surface-variant/60');
            const span = item.querySelector('span:first-child');
            if(span) span.style.fontVariationSettings = "'FILL' 1";
        });
    });
</script>
