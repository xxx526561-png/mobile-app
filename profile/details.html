<script>
        // Micro-interaction: Input focus effect
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.borderBottomColor = '#f9bd22';
                input.parentElement.style.transition = 'border-color 0.3s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.borderBottomColor = 'rgba(68, 71, 72, 0.3)';
            });
        });

        // Simple button active state simulation
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('touchstart', () => {
                el.style.transform = 'scale(0.96)';
            });
            el.addEventListener('touchend', () => {
                el.style.transform = 'scale(1)';
            });
        });
