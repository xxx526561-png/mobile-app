<script>
        // Micro-interaction: Task card click effect
        document.querySelectorAll('.bg-surface-container-low').forEach(card => {
            card.addEventListener('click', function() {
                this.classList.add('scale-98');
                setTimeout(() => this.classList.remove('scale-98'), 150);
            });
        });

        // Floating ambient effect
        const createParticle = () => {
            const particle = document.createElement('div');
            particle.className = 'fixed rounded-full pointer-events-none opacity-20 bg-secondary';
            const size = Math.random() * 4 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            document.body.appendChild(particle);
            
            const animation = particle.animate([
                { transform: 'translateY(0) scale(1)', opacity: 0.2 },
                { transform: `translateY(-${Math.random() * 100 + 50}px) scale(0)`, opacity: 0 }
            ], {
                duration: Math.random() * 3000 + 2000,
                easing: 'ease-out'
            });

            animation.onfinish = () => particle.remove();
        };

        setInterval(createParticle, 500);
    </script>
