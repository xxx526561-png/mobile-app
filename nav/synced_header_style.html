<script>
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('click', (e) => {
                // Haptic simulation if available
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
        
        // Handle sorting icon rotation for demo
        document.querySelectorAll('button .material-symbols-outlined').forEach(icon => {
            if(icon.innerText === 'unfold_more') {
                icon.parentElement.addEventListener('click', () => {
                    if(icon.innerText === 'unfold_more' || icon.innerText === 'expand_more') {
                        icon.innerText = 'expand_less';
                    } else {
                        icon.innerText = 'expand_more';
                    }
                });
            }
        });
